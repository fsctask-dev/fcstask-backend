# Default values for fcsapp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: andrewlimit/fcsapp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

container:
  port: 8080

#ingress:
#  enabled: false
#  className: ""
#  annotations: {}
#    # kubernetes.io/ingress.class: nginx
#    # kubernetes.io/tls-acme: "true"
#  hosts:
#    - host: chart-example.local
#      paths:
#        - path: /
#          pathType: ImplementationSpecific
#  tls: []
#  #  - secretName: chart-example-tls
#  #    hosts:
#  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

config:
  server:
    host: "0.0.0.0"
    port: 8080
    shutdownTimeout: "5s"

  database:
    host: "postgres-dev-postgresql-primary.postgres-dev.svc.cluster.local"
    port: 5432
    username: "postgres"
    password: ""
    database: "postgres"
    sslMode: "disable"
    maxOpenConns: 25
    maxIdleConns: 25
    connMaxLifetime: "5m"
    pingTimeout: "5s"
    replicas:
      - host: "postgres-replica"
        port: 5432
        username: "postgres"
        password: ""
        database: "fcstask"
        sslMode: "disable"

  session:
    ttl: "24h"
    cleanupInterval: "5s"

volumeMounts:
  - name: app-config
    mountPath: /home/fcstask-admin/config/config.yaml
    subPath: config.yaml
    readOnly: true

volumes:
  - name: app-config
    secret:
      secretName: fcsapp-config

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: fcs-task-dev.turbomuza.ru
      paths:
        - path: /
          pathType: Prefix
  tls: []