apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fcsapp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  config.yaml: |
    server:
      host: {{ .Values.config.server.host | quote }}
      port: {{ .Values.config.server.port }}
      shutdown_timeout: {{ .Values.config.server.shutdownTimeout | quote }}

    database:
      host: {{ .Values.config.database.host | quote }}
      port: {{ .Values.config.database.port }}
      username: {{ .Values.config.database.username | quote }}
      password: {{ .Values.config.database.password | quote }}
      database: {{ .Values.config.database.database | quote }}
      ssl_mode: {{ .Values.config.database.sslMode | quote }}
      max_open_conns: {{ .Values.config.database.maxOpenConns }}
      max_idle_conns: {{ .Values.config.database.maxIdleConns }}
      conn_max_lifetime: {{ .Values.config.database.connMaxLifetime | quote }}
      ping_timeout: {{ .Values.config.database.pingTimeout | quote }}
      replicas:
      {{- range .Values.config.database.replicas }}
        - host: {{ .host | quote }}
          port: {{ .port }}
          username: {{ .username | quote }}
          password: {{ .password | quote }}
          database: {{ .database | quote }}
          ssl_mode: {{ .sslMode | quote }}
      {{- end }}

    session:
      ttl: {{ .Values.config.session.ttl | quote }}
      cleanup_interval: {{ .Values.config.session.cleanupInterval | quote }}

    observability:
      metrics_addr: {{ .Values.config.observability.metricsAddr | quote }}
      db_stats_interval: {{ .Values.config.observability.dbStatsInterval | quote }}
