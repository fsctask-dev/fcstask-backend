services:
  postgres:
    image: postgres:16-alpine
    container_name: fcstask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fcstask
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fcstask"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fcstask-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.docker.yaml:/home/fcstask-admin/config/config.yaml
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: