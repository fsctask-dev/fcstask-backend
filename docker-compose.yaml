# PostgreSQL primary (master) + streaming replica (slave), Bitnami.
# Master: localhost:6432   Replica (read-only): localhost:6433
# User / password / database: postgres / postgres / fcstask

# run: make up

services:
  postgres-primary:
    image: docker.io/bitnami/postgresql:latest
    container_name: fcstask-postgres-primary
    restart: unless-stopped
    networks: [fcstask-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fcstask"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    environment:
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-fcstask}
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicatorpass}
    ports:
      - "6432:5432"
    volumes:
      - postgres_primary_data:/bitnami/postgresql

  postgres-replica:
    image: docker.io/bitnami/postgresql:latest
    container_name: fcstask-postgres-replica
    restart: unless-stopped
    networks: [fcstask-net]
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-fcstask}
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicatorpass}
    ports:
      - "6433:5432"
    volumes:
      - postgres_replica_data:/bitnami/postgresql

  telegram-bot:
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    image: fcstask-telegram-bot
    container_name: fcstask-telegram-bot
    restart: unless-stopped
    networks: [fcstask-net]
    # The backend API runs on the host, so reach it via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://host.docker.internal:8080}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-}

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: fcstask-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [fcstask-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # render config from template (sed) at container startup so secrets stay in .env
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    volumes:
      - ./monitoring/prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - ./monitoring/prometheus/prometheus.yml.tmpl:/etc/prometheus/prometheus.yml.tmpl:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    env_file:
      - .env
    ports:
      - "9090:9090"

  alertmanager:
    image: quay.io/prometheus/alertmanager:v0.28.1
    container_name: fcstask-alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [fcstask-net]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    env_file:
      - .env
    ports:
      - "9093:9093"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    container_name: fcstask-postgres-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [fcstask-net]
    depends_on:
      postgres-primary:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: ${DATA_SOURCE_NAME:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-primary:5432/${POSTGRES_DB:-fcstask}?sslmode=disable}
    ports:
      - "9187:9187"

  sql-exporter:
    image: burningalchemist/sql_exporter:0.18
    container_name: fcstask-sql-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [fcstask-net]
    depends_on:
      postgres-primary:
        condition: service_healthy
    command:
      - --config.file=/etc/sql_exporter/sql_exporter.yaml
    volumes:
      - ./monitoring/sql-exporter/sql_exporter.yaml:/etc/sql_exporter/sql_exporter.yaml:ro
      - ./monitoring/sql-exporter/pg_fcstask.collector.yaml:/etc/sql_exporter/pg_fcstask.collector.yaml:ro
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: ${DATA_SOURCE_NAME:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-primary:5432/${POSTGRES_DB:-fcstask}?sslmode=disable}
    ports:
      - "9399:9399"

networks:
  fcstask-net: {}

volumes:
  postgres_primary_data:
  postgres_replica_data:
  prometheus_data:
  alertmanager_data:
