name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'release/**'

env:
  IMAGE_NAME: fcstask-backend
  K8S_NAMESPACE_TEST: fcstask-backend-test
  K8S_NAMESPACE_PROD: fcstask-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Prepare variables
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_REGISTRY_USER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

  deploy-test-to-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE_TEST }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to test
        env:
          IMAGE_REPOSITORY: ${{ secrets.DOCKER_REGISTRY_USER }}/${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.short_sha }}

          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          helm upgrade --install fcsapp ./helm/fcsapp \
            --namespace ${{ env.K8S_NAMESPACE_TEST }} \
            -f ./helm/fcsapp/values-test.yaml \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --set config.database.username="$DB_USERNAME" \
            --set config.database.password="$DB_PASSWORD" \
            --set config.database.replicas[0].username="$DB_USERNAME" \
            --set config.database.replicas[0].password="$DB_PASSWORD" \
            --wait

  deploy-prod-to-k8s:
    needs:
      - build-and-push
      - deploy-test-to-k8s

    if: startsWith(github.ref, 'refs/heads/release/')

    runs-on: self-hosted
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE_PROD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to prod
        env:
          IMAGE_REPOSITORY: ${{ secrets.DOCKER_REGISTRY_USER }}/${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.short_sha }}

          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          helm upgrade --install fcsapp ./helm/fcsapp \
            --namespace ${{ env.K8S_NAMESPACE_PROD }} \
            -f ./helm/fcsapp/values-prod.yaml \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --set config.database.username="$DB_USERNAME" \
            --set config.database.password="$DB_PASSWORD" \
            --set config.database.replicas[0].username="$DB_USERNAME" \
            --set config.database.replicas[0].password="$DB_PASSWORD" \
            --wait \
            --timeout 5m \
            --atomic
