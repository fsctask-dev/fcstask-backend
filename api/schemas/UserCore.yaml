type: object
required:
  - email
  - username
  - user_id
properties:
  email:
    type: string
    format: email
    description: User email address
  username:
    type: string
    description: GitHub username
  first_name:
    type: string
    description: First name
  last_name:
    type: string
    description: Last name
  tg_uid:
    type: integer
    format: int64
    description: Telegram user ID
  user_id:
    type: string
    format: uuid
    description: Internal user ID
