openapi: 3.0.3
info:
  title: FCS Task API
  version: "1.0"
  description: API for FCS Task with user management

servers:
  - url: /v1
    description: API v1

paths:
  /v1/echo:
    post:
      operationId: PostV1Echo
      responses:
        "200":
          description: ok
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /v1/users:
    post:
      security:
        - bearerAuth: []
      operationId: CreateUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/users/{id}:
    get:
      security:
        - bearerAuth: []
      operationId: GetUserByID
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/users/username/{username}:
    get:
      security:
        - bearerAuth: []
      operationId: GetUserByUsername
      summary: Get user by username
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/users/email/{email}:
    get:
      security:
        - bearerAuth: []
      operationId: GetUserByEmail
      summary: Get user by email
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions:
    get:
      security:
        - bearerAuth: []
      operationId: GetSessions
      summary: Get all active sessions with user data (paginated)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of items to skip
      responses:
        "200":
          description: Paginated list of sessions with user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSessionsResponse"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/users/sessions:
    get:
      operationId: GetUsersWithSessions
      summary: Get all users with their active sessions (paginated by user)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of users per page
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of users to skip
      responses:
        "200":
          description: Paginated list of users with their sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsersWithSessionsResponse"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/signup:
    post:
      operationId: SignUp
      summary: Begin email/password registration; sends a verification code to the email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "202":
          description: Verification code sent; client must call /api/signup/verify to finish
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpPendingResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/signup/verify:
    post:
      operationId: SignUpVerify
      summary: Finish registration by submitting the emailed verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpVerifyRequest"
      responses:
        "201":
          description: User created and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid verification code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Verification token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Verification token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many verification attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/signup/resend-code:
    post:
      operationId: SignUpResendCode
      summary: Re-send the email verification code; rate-limited
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpResendRequest"
      responses:
        "200":
          description: New code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpPendingResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Verification token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Verification token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Cooldown not elapsed yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/password-reset/request:
    post:
      operationId: PasswordResetRequest
      summary: Start password reset; sends a code to the user's email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "202":
          description: Reset code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetPendingResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User with this email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/password-reset/resend-code:
    post:
      operationId: PasswordResetResend
      summary: Re-send the password reset code; rate-limited
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetResendRequest"
      responses:
        "200":
          description: New code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetPendingResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reset token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Reset token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Cooldown not elapsed yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/password-reset/confirm:
    post:
      operationId: PasswordResetConfirm
      summary: Confirm a password reset and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirmRequest"
      responses:
        "204":
          description: Password reset; all existing sessions invalidated
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid reset code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reset token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Reset token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/signin:
    post:
      operationId: SignIn
      summary: Sign in with email or username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "200":
          description: Successfully signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/oauth/{provider}/exchange:
    post:
      operationId: OAuthExchange
      summary: Exchange OAuth provider payload for a session or a registration token
      parameters:
        - name: provider
          in: path
          required: true
          description: One of `gitlab`, `google`, `telegram`
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthExchangeRequest"
      responses:
        "200":
          description: Either signed in (status=ok) or registration required (status=registration_required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthExchangeResponse"
        "400":
          description: Invalid payload or signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Provider unknown or disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/oauth/add/{provider}/exchange:
    post:
      security:
        - bearerAuth: []
      operationId: OAuthAddExchange
      summary: Link Oauth identity to existing account
      parameters:
        - name: provider
          in: path
          required: true
          description: One of `gitlab`, `google`, `telegram`
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthExchangeRequest"
      responses:
        "200":
          description: Oauth identity added
        "400":
          description: Invalid payload or signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Provider unknown or disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/oauth/add/{provider}/unlink:
    post:
      security:
        - bearerAuth: []
      operationId: OAuthUnlink
      summary: Unlink Oauth identity from existing account
      parameters:
        - name: provider
          in: path
          required: true
          description: One of `gitlab`, `google`, `telegram`
          schema:
            type: string
      responses:
        "200":
          description: Oauth identity unlinked
        "404":
          description: Provider unknown, disabled or not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
                
  /api/oauth/complete-signup:
    post:
      operationId: OAuthCompleteSignUp
      summary: Finish registration started by an OAuth exchange and create the user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthCompleteSignUpRequest"
      responses:
        "201":
          description: User created and awaiting email verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpPendingResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Registration token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/signout:
    post:
      security:
        - bearerAuth: []
      operationId: SignOut
      summary: Sign out and delete current session
      responses:
        "204":
          description: Successfully signed out
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/api/me:
    get:
      operationId: GetMe
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: uuid
      description: Session token obtained from /api/signup or /api/signin

  schemas:
    User:
      $ref: "./schemas/User.yaml"
    CreateUserRequest:
      $ref: "./schemas/CreateUserRequest.yaml"
    Error:
      $ref: "./schemas/Error.yaml"
    SignUpRequest:
      $ref: "./schemas/SignUpRequest.yaml"
    SignInRequest:
      $ref: "./schemas/SignInRequest.yaml"
    AuthResponse:
      $ref: "./schemas/AuthResponse.yaml"
    MeResponse:
      $ref: "./schemas/MeResponse.yaml"
    SessionWithUser:
      allOf:
        - $ref: "#/components/schemas/Session"
        - type: object
          required:
            - user
          properties:
            user:
              $ref: "#/components/schemas/User"
    Pagination:
      $ref: "./schemas/Pagination.yaml"
    PaginatedSessionsResponse:
      allOf:
        - $ref: "#/components/schemas/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SessionWithUser"
    Session:
      $ref: "./schemas/Session.yaml"
    UserWithSessions:
      type: object
      required:
        - user
        - sessions
      properties:
        user:
          $ref: "#/components/schemas/User"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/Session"
    PaginatedUsersWithSessionsResponse:
      allOf:
        - $ref: "#/components/schemas/Pagination"
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/UserWithSessions"
    OAuthExchangeRequest:
      $ref: "./schemas/OAuthExchangeRequest.yaml"
    OAuthExchangeResponse:
      $ref: "./schemas/OAuthExchangeResponse.yaml"
    OAuthSuggestedProfile:
      $ref: "./schemas/OAuthSuggestedProfile.yaml"
    OAuthCompleteSignUpRequest:
      $ref: "./schemas/OAuthCompleteSignUpRequest.yaml"
    SignUpPendingResponse:
      $ref: "./schemas/SignUpPendingResponse.yaml"
    SignUpVerifyRequest:
      $ref: "./schemas/SignUpVerifyRequest.yaml"
    SignUpResendRequest:
      $ref: "./schemas/SignUpResendRequest.yaml"
    PasswordResetRequest:
      $ref: "./schemas/PasswordResetRequest.yaml"
    PasswordResetPendingResponse:
      $ref: "./schemas/PasswordResetPendingResponse.yaml"
    PasswordResetResendRequest:
      $ref: "./schemas/PasswordResetResendRequest.yaml"
    PasswordResetConfirmRequest:
      $ref: "./schemas/PasswordResetConfirmRequest.yaml"

