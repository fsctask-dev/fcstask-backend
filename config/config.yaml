server:
  host: "0.0.0.0"
  port: 8080
  shutdown_timeout: 5s

database:
  host: "localhost"
  port: 6432
  username: "postgres"
  password: "postgres"
  database: "fcstask"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: 5m
  ping_timeout: 5s
  replicas:
    - host: "localhost"
      port: 6433
      username: "postgres"
      password: "postgres"
      database: "fcstask"
      ssl_mode: "disable"

oauth:
  registration_ttl: 15m
  cleanup_interval: 5m
  gitlab:
    enabled: false
    base_url: "https://gitlab.com"
    client_id: ""
    client_secret: ""
  google:
    enabled: false
    client_id: ""
    client_secret: ""
  telegram:
    enabled: false
    bot_token: ""
    max_auth_age_seconds: 8640

email_registration:
  ttl: 15m
  cleanup_interval: 5m

mailer:
  enabled: false
  from: "noreply@fcs-task.local"
  code_ttl: 15m
  resend_cooldown: 60s
  max_attempts: 5
  cleanup_interval: 5m
  smtp:
    ssl: false
    host: ""
    port: 587
    username: ""
    password: ""
    pool_size: 17

session:
  ttl: 24h
  cleanup_interval: 5s
