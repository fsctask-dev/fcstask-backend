version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v${PROMETHEUS_VERSION}
    container_name: fcstask-prometheus
    env_file: .env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./config/prometheus.entrypoint.sh:/entrypoint.sh:ro
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules.yml.tmpl:/etc/prometheus/rules.yml.tmpl:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v${ALERTMANAGER_VERSION}
    container_name: fcstask-alertmanager
    env_file: .env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "${ALERTMANAGER_PORT}:${ALERTMANAGER_PORT}"
    volumes:
      - ./config/alertmanager.entrypoint.sh:/entrypoint.sh:ro
      - ./config/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - monitoring-net
    restart: unless-stopped

  monitor-postgres:
    image: postgres:15-alpine
    container_name: fcstask-monitor-postgres
    environment:
      POSTGRES_USER: fcstask
      POSTGRES_PASSWORD: ${BOT_DB_PASSWORD}
      POSTGRES_DB: fcstask-monitor-bot
    volumes:
      - monitor_postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring-net
    restart: unless-stopped

  monitor-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: fcstask-monitor-bot
    env_file: ./bot/.env
    ports:
      - "9094:9094"
    depends_on:
      - monitor-postgres
    networks:
      - monitoring-net
    restart: unless-stopped

volumes:
  prometheus_data:
  monitor_postgres_data:

networks:
  monitoring-net:
    driver: bridge
